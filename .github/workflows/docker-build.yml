name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v3

      # ✅ Login to DockerHub
      - name: ✅ Docker Login
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # ✅ Auth Service
      - name: ✅ Auth Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-auth ./services/auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-auth

      # ✅ User Service
      - name: ✅ User Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-user ./services/user-service
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-user

      # ✅ Portfolio Service
      - name: ✅ Portfolio Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-portfolio ./services/portfolio-service
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-portfolio

      # ✅ Notification Service
      - name: ✅ Notification Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-notification ./services/notification-service
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-notification

      # ✅ API Gateway
      - name: ✅ API Gateway
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-gateway ./services/api-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-gateway

      # ✅ Frontend
      - name: ✅ Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/finin-frontend ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/finin-frontend